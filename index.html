<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔐 My Secure Vault</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ----- CSS Variables for Light/Dark Mode ----- */
        :root {
            --bg: #f4f6fb;
            --card-bg: #ffffff;
            --text: #1e1e2f;
            --soft-shadow: 0 20px 40px rgba(0, 20, 30, 0.08);
            --border-radius: 28px;
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --input-bg: #f0f2f8;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body.dark {
            --bg: #12121a;
            --card-bg: #1e1e2e;
            --text: #eaeef2;
            --input-bg: #2a2a3e;
            --soft-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: var(--transition);
        }

        /* ----- Glass-morphism Main Card ----- */
        .vault-container {
            max-width: 820px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: var(--border-radius);
            padding: 32px 30px;
            box-shadow: var(--soft-shadow);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header h1 i {
            -webkit-text-fill-color: initial;
            color: var(--primary);
            margin-right: 8px;
        }

        .top-actions {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--input-bg);
            border: none;
            color: var(--text);
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        /* ----- Add / Input Section ----- */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--input-bg);
            padding: 22px 20px;
            border-radius: 24px;
            margin-bottom: 30px;
            transition: var(--transition);
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .input-row input {
            flex: 1 1 180px;
            padding: 14px 18px;
            border: none;
            border-radius: 60px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: var(--transition);
            outline: 1px solid transparent;
        }

        .input-row input:focus {
            outline: 2px solid var(--primary);
            box-shadow: 0 0 0 6px rgba(108, 92, 231, 0.12);
        }

        .input-row input::placeholder {
            color: #999;
            font-weight: 400;
        }

        .btn-add {
            flex: 0 0 auto;
            padding: 14px 34px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--primary), #a29bfe);
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 18px rgba(108, 92, 231, 0.25);
        }

        .btn-add:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 14px 28px rgba(108, 92, 231, 0.35);
        }

        .btn-add i {
            font-size: 16px;
        }

        /* ----- Search Bar ----- */
        .search-box {
            position: relative;
            margin-bottom: 24px;
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 14px 18px 14px 50px;
            border-radius: 60px;
            border: none;
            background: var(--input-bg);
            color: var(--text);
            font-size: 15px;
            transition: var(--transition);
            outline: 1px solid transparent;
        }

        .search-box input:focus {
            outline: 2px solid var(--primary-light);
            background: var(--card-bg);
        }

        /* ----- Credential List ----- */
        .list-header {
            display: flex;
            justify-content: space-between;
            margin: 18px 4px 12px 4px;
            font-weight: 600;
            font-size: 14px;
            color: #999;
            letter-spacing: 0.5px;
            padding: 0 6px;
        }

        .cred-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Hide scrollbar but keep functionality */
        .cred-list::-webkit-scrollbar {
            width: 4px;
        }
        .cred-list::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }

        /* Each Card */
        .cred-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: var(--input-bg);
            padding: 14px 20px;
            border-radius: 20px;
            transition: var(--transition);
            animation: fadeSlide 0.25s ease;
            gap: 10px 8px;
            border-left: 4px solid var(--primary);
        }

        .cred-item:hover {
            transform: translateX(4px);
            background: var(--card-bg);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.04);
        }

        .cred-info {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 20px;
            flex: 2 1 240px;
        }

        .cred-info .site {
            font-weight: 600;
            font-size: 16px;
            min-width: 100px;
        }

        .cred-info .user {
            color: #7f8fa6;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cred-info .user i {
            color: var(--primary);
        }

        .cred-info .pass-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card-bg);
            padding: 4px 12px 4px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .pass-wrapper .toggle-pass {
            background: transparent;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }
        .pass-wrapper .toggle-pass:hover {
            color: var(--primary);
        }

        .cred-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .cred-actions button {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cred-actions .copy-btn:hover {
            background: #00b89420;
            color: #00b894;
        }
        .cred-actions .delete-btn:hover {
            background: #ff767520;
            color: #ff6b6b;
        }

        .empty-msg {
            text-align: center;
            padding: 40px 10px;
            color: #999;
            font-style: italic;
        }

        /* Animations */
        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 650px) {
            .vault-container {
                padding: 20px 16px;
            }
            .input-row input {
                flex: 1 1 100%;
            }
            .btn-add {
                width: 100%;
                justify-content: center;
            }
            .header h1 {
                font-size: 22px;
            }
            .cred-info {
                flex: 1 1 100%;
            }
            .cred-actions {
                flex: 1 1 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="vault-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> My Vault</h1>
            <div class="top-actions">
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- Add Credential -->
        <div class="input-section">
            <div class="input-row">
                <input type="text" id="siteInput" placeholder="🔖 Website / App name" />
                <input type="text" id="userInput" placeholder="👤 Username / Email" />
                <input type="text" id="passInput" placeholder="🔑 Password" />
                <button class="btn-add" id="addBtn"><i class="fas fa-plus-circle"></i> Save</button>
            </div>
        </div>

        <!-- Search -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search your saved accounts..." />
        </div>

        <!-- List -->
        <div class="list-header">
            <span>🔐 Saved Credentials</span>
            <span id="countDisplay">0 items</span>
        </div>

        <div class="cred-list" id="credList">
            <!-- dynamically rendered -->
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ----- DOM refs -----
            const siteInput = document.getElementById('siteInput');
            const userInput = document.getElementById('userInput');
            const passInput = document.getElementById('passInput');
            const addBtn = document.getElementById('addBtn');
            const searchInput = document.getElementById('searchInput');
            const credList = document.getElementById('credList');
            const countDisplay = document.getElementById('countDisplay');
            const themeToggle = document.getElementById('themeToggle');

            // ----- Data -----
            let credentials = [];

            // Load from localStorage
            function loadData() {
                const stored = localStorage.getItem('secureVaultData');
                if (stored) {
                    try {
                        credentials = JSON.parse(stored);
                    } catch (e) {
                        credentials = [];
                    }
                } else {
                    // sample demo data
                    credentials = [
                        { id: Date.now() + 1, site: 'Gmail', username: 'suraj@gmail.com', password: 'demo@123' },
                        { id: Date.now() + 2, site: 'GitHub', username: 'suraj_coder', password: 'git#2025' },
                    ];
                }
                render();
            }

            // Save to localStorage
            function saveData() {
                localStorage.setItem('secureVaultData', JSON.stringify(credentials));
                render();
            }

            // Render list
            function render(filter = '') {
                const searchTerm = filter.toLowerCase().trim();
                let filtered = credentials;
                if (searchTerm !== '') {
                    filtered = credentials.filter(item =>
                        item.site.toLowerCase().includes(searchTerm) ||
                        item.username.toLowerCase().includes(searchTerm)
                    );
                }

                if (filtered.length === 0) {
                    credList.innerHTML = `<div class="empty-msg"><i class="fas fa-inbox" style="font-size:28px; display:block; margin-bottom:8px;"></i> No credentials saved yet.</div>`;
                    countDisplay.innerText = `0 items`;
                    return;
                }

                let html = '';
                filtered.forEach((item, index) => {
                    // we store real index for delete/copy actions
                    const realIndex = credentials.findIndex(c => c.id === item.id);
                    html += `
                        <div class="cred-item" data-id="${item.id}">
                            <div class="cred-info">
                                <span class="site"><i class="fas fa-globe" style="color:var(--primary); margin-right:8px;"></i>${escapeHtml(item.site)}</span>
                                <span class="user"><i class="fas fa-user-circle"></i> ${escapeHtml(item.username)}</span>
                                <span class="pass-wrapper">
                                    <span class="pass-text" id="passText_${item.id}">${'•'.repeat(10)}</span>
                                    <button class="toggle-pass" data-id="${item.id}" title="Show/Hide Password"><i class="fas fa-eye"></i></button>
                                </span>
                            </div>
                            <div class="cred-actions">
                                <button class="copy-btn" data-id="${item.id}" data-type="user" title="Copy Username"><i class="fas fa-copy"></i></button>
                                <button class="copy-btn" data-id="${item.id}" data-type="pass" title="Copy Password"><i class="fas fa-key"></i></button>
                                <button class="delete-btn" data-id="${item.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    `;
                });

                credList.innerHTML = html;
                countDisplay.innerText = `${filtered.length} items`;

                // Attach event listeners for each item
                document.querySelectorAll('.toggle-pass').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        togglePassword(id);
                    });
                });

                document.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        const type = this.dataset.type;
                        copyCredential(id, type);
                    });
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        deleteCredential(id);
                    });
                });
            }

            // Helper: escape HTML
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ----- CRUD Operations -----

            function addCredential() {
                const site = siteInput.value.trim();
                const username = userInput.value.trim();
                const password = passInput.value.trim();

                if (!site || !username || !password) {
                    alert('⚠️ Please fill all fields (Website, Username, Password)');
                    return;
                }

                const newItem = {
                    id: Date.now(),
                    site: site,
                    username: username,
                    password: password,
                };

                credentials.push(newItem);
                saveData();
                // clear inputs
                siteInput.value = '';
                userInput.value = '';
                passInput.value = '';
                siteInput.focus();
            }

            function deleteCredential(id) {
                if (confirm('Are you sure you want to delete this entry?')) {
                    credentials = credentials.filter(item => item.id !== id);
                    saveData();
                }
            }

            function togglePassword(id) {
                const item = credentials.find(c => c.id === id);
                if (!item) return;
                const passSpan = document.getElementById(`passText_${id}`);
                if (!passSpan) return;
                // if currently showing dots, reveal password
                if (passSpan.textContent.includes('•')) {
                    passSpan.textContent = item.password;
                } else {
                    passSpan.textContent = '•'.repeat(10);
                }
            }

            function copyCredential(id, type) {
                const item = credentials.find(c => c.id === id);
                if (!item) return;
                let textToCopy = type === 'user' ? item.username : item.password;
                if (!textToCopy) return;

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        showToast(`${type === 'user' ? 'Username' : 'Password'} copied! ✅`);
                    }).catch(() => {
                        fallbackCopy(textToCopy);
                    });
                } else {
                    fallbackCopy(textToCopy);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('Copied! ✅');
                } catch (e) {
                    alert('Unable to copy. Please copy manually.');
                }
                document.body.removeChild(textarea);
            }

            // Simple toast notification
            function showToast(msg) {
                const old = document.querySelector('.custom-toast');
                if (old) old.remove();

                const toast = document.createElement('div');
                toast.className = 'custom-toast';
                toast.innerHTML = `<i class="fas fa-check-circle" style="margin-right:10px; color:#00b894;"></i> ${msg}`;
                Object.assign(toast.style, {
                    position: 'fixed',
                    bottom: '30px',
                    left: '50%',
                    transform: 'translateX(-50%)',
                    background: '#1e1e2e',
                    color: '#fff',
                    padding: '14px 32px',
                    borderRadius: '60px',
                    boxShadow: '0 12px 40px rgba(0,0,0,0.4)',
                    fontSize: '15px',
                    zIndex: '9999',
                    fontWeight: '500',
                    fontFamily: 'Segoe UI, sans-serif',
                    transition: 'all 0.3s ease',
                    border: '1px solid #333',
                    backdropFilter: 'blur(6px)',
                });
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(-50%) translateY(30px)';
                    setTimeout(() => toast.remove(), 400);
                }, 2000);
            }

            // ----- Theme Toggle -----
            function toggleTheme() {
                document.body.classList.toggle('dark');
                const icon = themeToggle.querySelector('i');
                if (document.body.classList.contains('dark')) {
                    icon.className = 'fas fa-sun';
                } else {
                    icon.className = 'fas fa-moon';
                }
                // save preference
                localStorage.setItem('vaultTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
            }

            // load theme preference
            function loadTheme() {
                const theme = localStorage.getItem('vaultTheme');
                if (theme === 'dark') {
                    document.body.classList.add('dark');
                    themeToggle.querySelector('i').className = 'fas fa-sun';
                } else {
                    document.body.classList.remove('dark');
                    themeToggle.querySelector('i').className = 'fas fa-moon';
                }
            }

            // ----- Event listeners -----
            addBtn.addEventListener('click', addCredential);

            // Enter key on any input triggers add
            [siteInput, userInput, passInput].forEach(inp => {
                inp.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') addCredential();
                });
            });

            searchInput.addEventListener('input', function() {
                render(this.value);
            });

            themeToggle.addEventListener('click', toggleTheme);

            // ----- Init -----
            loadTheme();
            loadData();

            // re-render on search if data changes externally? (not needed)

            console.log('🔐 Secure Vault is ready!');
        })();
    </script>
</body>
</html>
